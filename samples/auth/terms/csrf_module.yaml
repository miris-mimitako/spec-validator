          line: 23
          status: "implemented"
        - path: "hozen_back/src/production-plan-process/production-plan-process.module.ts"
          line: 12
          status: "implemented"
    - id: "RULE-003"
      description: "フロントエンドの mutation リクエスト（POST/PUT/PATCH/DELETE）を実装する API 関数は、getCsrfToken() で csrf_token Cookie を読み取り、X-CSRF-Token ヘッダーとして付与すること。auth.ts の login() 関数のパターン（...(csrfToken ? { 'X-CSRF-Token': csrfToken } : {})）を踏襲する"
      added_by: "bugfix/bugfix_csrf_token_missing_in_put"
      implemented_in:
        - path: "hozen_front/front/src/lib/api/auth.ts"
          line: 177
          status: "implemented"
        - path: "hozen_front/front/src/lib/api/auth.ts"
          line: 216
          status: "implemented"
        - path: "hozen_front/front/src/lib/api/todoItem.ts"
          line: 83
          status: "implemented"
    - id: "RULE-004"
      description: "GET /auth/csrf-token は csrf_token Cookie と同じ値をレスポンスボディ token に返し、トークン生成不能時は 500 ではなく 503 Service Unavailable を返す。POST /auth/login の CSRF 検証失敗時は 403 と reason（csrf_missing / csrf_invalid）を返して OpenAPI と一致させる"
      added_by: "issue-orchestration/#387"
      implemented_in:
