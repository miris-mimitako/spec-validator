Term: "CSRF モジュール (CsrfModule)"
Definition: "CSRF 検証機能（CsrfService + CsrfGuard）を集約する NestJS モジュール。CSRF 保護が必要な任意のモジュールで imports して利用する"

DB:
  $ref: null
  Join: null

Domain:
  BoundedContext: Auth
  Aggregate: null
  ValueObject: null
  DomainEvent: null
  Rule:
    - id: "RULE-001"
      description: "CsrfService および CsrfGuard は専用の CsrfModule に集約し、CSRF 検証が必要なすべてのモジュールで CsrfModule を imports すること。AuthModule に直接 CsrfService を登録してはならない"
      added_by: "bugfix/bugfix_csrf_guard_missing_in_control_m"
      implemented_in:
        - path: "hozen_back/src/auth/csrf.module.ts"
          line: 1
          status: "implemented"
        - path: "hozen_back/src/auth/auth.module.ts"
          line: 29
          status: "implemented"
    - id: "RULE-002"
      description: "CsrfGuard を @UseGuards() で使用するモジュールは、必ず CsrfModule を imports に含めること。CsrfModule を imports せずに CsrfGuard を使用すると NestJS の DI 解決が失敗し UnknownDependenciesException が発生する"
      added_by: "bugfix/bugfix_csrf_svc_not_provided_ctrl_mod"
      implemented_in:
        - path: "hozen_back/src/control-master/control-master.module.ts"
          line: 146
          status: "implemented"
