Term: "ログイン (Login Action)"
Definition: "認証処理（act2）を実行し、成功時にチーム自動割当（act1）を行いトップページへ遷移する"

DB:
  $ref: "../../ddl/employee_inf.prisma#employee_inf.employee_code"
  Join: "employee_team ON employee_team.employee_code = employee_inf.employee_code; trans_org_to_team ON org fields match"

Domain:
  BoundedContext: Auth
  Aggregate: Employee
  ValueObject: null
  DomainEvent: LoginSucceeded
  Rule:
    - "認証成功時、employee_team にレコードがなければ trans_org_to_team から自動割当する"
    - "認証失敗時はエラーメッセージを表示"
    - id: "RULE-001"
      description: "ログインフロー中（login API 成功直後〜画面遷移完了まで）の補助 API 呼び出し（user-preferences 等）が失敗しても、ログインフロー自体を中断してはならない。失敗時はデフォルト値で続行する"
      added_by: "bugfix/bugfix_login_session_error_after_submit"
      implemented_in:
        - path: "hozen_front/front/src/components/LoginForm.tsx"
          line: 110
          status: "implemented"
    - id: "RULE-002"
      description: "ログイン API リクエストのタイムアウト値は Lambda cold start（最大 30 秒）を考慮した値（FETCH_TIMEOUT_MS ≥ 30,000ms）に設定しなければならない。タイムアウト発火時は技術的なエラーメッセージではなく日本語の分かりやすいメッセージを表示すること"
      added_by: "bugfix/bugfix_login_network_errors"
      implemented_in:
        - path: "hozen_front/front/src/lib/api/auth.ts"
          line: 104
          status: "implemented"
    - id: "RULE-003"
      description: "AbortController.abort() を引数なしで呼ぶと 'signal is aborted without reason' が表示される。必ず abort(reason) の形で理由を渡すか、catch ブロックで ApiError に変換すること"
      added_by: "bugfix/bugfix_login_network_errors"
      implemented_in:
        - path: "hozen_front/front/src/lib/api/auth.ts"
          line: 291
          status: "implemented"
    - id: "RULE-004"
      description: "NestJS の @Injectable() Guard が constructor で DI 依存を持つ場合、その Guard を使用するモジュールは依存プロバイダーを含むモジュールを必ず imports すること。DI 依存のないGuard（例: AdminGuard）とは異なり、モジュール境界を越えた利用にはexports + imports が必須である"
      added_by: "bugfix/bugfix_csrf_guard_missing_in_control_m"
      implemented_in:
        - path: "hozen_back/src/control-master/control-master.module.ts"
          line: 146
          status: "implemented"
    - id: "RULE-005"
      description: "ログインレスポンスの UserInfoSecure に含めるフィールドは、フロントエンドの Cookie（hozen_employee）に保存される EmployeeCookie 型と一致させること。フロントエンドが参照するフィールドを UserInfoSecure から除外すると、サイレントに undefined となりバグの原因となる"
      added_by: "bugfix/bugfix_admin_flag_excluded_from_login_response"
      implemented_in:
