  - id: "INV-005"
    description: "ログイン試行回数がレートリミット（5回/15分）に達した場合は、技術的な HTTP ステータスコードではなく待機時間を含む日本語メッセージを表示すること"
    added_by: "bugfix/bugfix_login_network_errors"
  - id: "INV-006"
    description: "CSRF 検証機能（CsrfGuard + CsrfService）は独立した CsrfModule として提供され、認証以外のドメインモジュール（ControlMasterModule 等）でも再利用可能でなければならない"
    added_by: "bugfix/bugfix_csrf_guard_missing_in_control_m"
    implemented_in:
      - path: "hozen_back/src/auth/csrf.module.ts"
        status: "implemented"
      - path: "hozen_back/src/control-master/control-master.module.ts"
        status: "implemented"
      - path: "hozen_back/test/auth/csrf-module-import-regression.e2e-spec.ts"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/auth_security_hardening.spec.ts"
        status: "implemented"
  - id: "INV-007"
    description: "ログインレスポンスの user オブジェクトには admin_flag を含めること。admin_flag はフロントエンドの管理者判定に必要であり、VER-014 機密フィールド除外の対象外とする"
