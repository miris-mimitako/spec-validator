  - id: "INV-008"
    description: "JWT トークンは HttpOnly Cookie でのみ管理し、フロントエンドの JavaScript から直接アクセスできないこと（XSS 対策）"
    added_by: "bugfix/bugfix_cookie_httponly_flag"
  - id: "INV-009"
    description: "ログアウト時にサーバー側で hozen_jwt HttpOnly Cookie がクリアされること"
    added_by: "bugfix/bugfix_cookie_httponly_flag"
  - id: "INV-011"
    description: "レート制限はログイン失敗（認証エラー）のみをカウント対象とし、ログイン成功時はカウンターをリセットまたは加算対象外とする。正規ユーザーが繰り返しログインしても HTTP 429 によるロックアウトが発生しないこと"
    added_by: "bug/rate-limit-counts-success"
    implemented_in:
      - path: "hozen_back/src/auth/presentation/login-attempt-rate-limit.filter.ts"
        line: 1
        status: "implemented"
  - id: "INV-010"
    description: "FE の EmployeeCookie / UserInfo 型定義は BE の UserInfoSecure 型定義と同一のフィールドセットを持つこと。BE で除外されたフィールド（del_flag / department_code / employee_flag）は FE 型からも削除すること"
    added_by: "bugfix/bugfix_admin_flag_not_in_frontend"
    implemented_in:
      - path: "hozen_back/src/auth/domain/user-info.ts"
        status: "implemented"
      - path: "hozen_back/test/auth/auth-security.e2e-spec.ts"
        status: "implemented"
      - path: "hozen_back/test/auth/auth-cookie-flow.e2e-spec.ts"
        status: "implemented"
      - path: "hozen_front/front/src/lib/api/auth.ts"
        status: "implemented"
      - path: "hozen_front/front/src/lib/api/__tests__/auth.employee-cookie.test.ts"
        status: "implemented"
      - path: "hozen_front/front/src/lib/api/__tests__/auth.current-user.test.ts"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/login.spec.ts"
        status: "implemented"
  - id: "INV-012"
    description: "標準ログイン成功時は CSRF 保護付きで POST /auth/login を完了し、hozen_jwt HttpOnly Cookie と canonical user 情報を同期したうえで /{default_slug}/hikitsugi-menu へ遷移する"
    added_by: "issue-orchestration/#1688"
    implemented_in:
      - path: "hozen_back/src/auth/presentation/auth.controller.ts"
        status: "implemented"
      - path: "hozen_back/test/auth/auth-security.e2e-spec.ts"
        status: "implemented"
      - path: "hozen_front/front/src/components/LoginForm.tsx"
        status: "implemented"
      - path: "hozen_front/front/src/lib/api/auth.ts"
        status: "implemented"
      - path: "hozen_front/front/src/lib/api/__tests__/auth.employee-cookie.test.ts"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/login.spec.ts"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/auth_security_hardening.spec.ts"
        status: "implemented"

InitAction:
  act1:
    Description: |
      ログイン処理後、次の画面に遷移する前にチーム自動割当を行う。
      employee_team に該当 employee_code のレコードが存在するか確認する。
      存在しない場合、employee_inf の org 系カラム（base_code, location_code, location_gr_code）を使い、
      trans_org_to_team で一致する team_code を取得して employee_team に割り当てる。
    DataSource: "employee_team WHERE employee_code = {login_user} → trans_org_to_team WHERE factory_code, base_code, location_code, location_gr_code"
  act2:
    Description: |
      ログイン認証処理。
      employee_inf.employee_code と employee_inf.employee_password をもとに認証を行う。
      認証成功 → セッション（JWT）を発行してトップページ（/{slug}/hikitsugi-menu）へ遷移。
      認証失敗 → エラーメッセージを表示。
    DataSource: "employee_inf WHERE employee_code = {input} AND employee_password = {input}"

Terms:
  - UILabel: "User ID / 社員コード"
    Behavior: editable
    Filterable: false
    InitFrom: null
    Ref:
      $ref: "../terms/employee_code.yaml"

  - UILabel: "Password / パスワード"
    Behavior: editable
    Filterable: false
    InitFrom: null
    Ref:
      $ref: "../terms/employee_password.yaml"

  - UILabel: "ログインボタン"
    Behavior: action
    Filterable: false
    Ref:
      $ref: "../terms/login_action.yaml"

  - UILabel: "すぐに引継ぎを書く"
    Behavior: action
    Filterable: false
    Ref:
      $ref: "../terms/quick_new_item_action.yaml"

  - UILabel: "セッション切れバナー"
    Behavior: display_only
    Filterable: false
    Ref:
      $ref: "../terms/session_expired_banner.yaml"
