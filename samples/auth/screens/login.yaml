    implemented_in:
      - path: "hozen_back/src/auth/application/login.usecase.ts"
        status: "implemented"
      - path: "hozen_back/src/auth/infrastructure/adapter/team-auto-assign.adapter.ts"
        status: "implemented"
      - path: "hozen_back/src/auth/application/login.usecase.spec.ts"
        status: "implemented"
      - path: "hozen_back/test/auth/auth-security.e2e-spec.ts"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/login.spec.ts"
        status: "implemented"
  - id: "INVARIANT-002"
    description: "User ID は半角英数字4〜20文字の必須入力"
    implemented_in:
      - path: "hozen_front/front/src/components/LoginForm.tsx"
        status: "implemented"
      - path: "hozen_front/front/src/components/__tests__/LoginForm.test.tsx"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/login.spec.ts"
        status: "implemented"
  - id: "INVARIANT-003"
    description: "Password は必須入力（最大72文字）"
    implemented_in:
      - path: "hozen_front/front/src/components/LoginForm.tsx"
        status: "implemented"
      - path: "hozen_front/front/src/components/__tests__/LoginForm.test.tsx"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/login.spec.ts"
        status: "implemented"
  - "認証失敗時はエラーメッセージを表示し、画面遷移しない"
