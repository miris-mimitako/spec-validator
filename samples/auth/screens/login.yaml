    description: "ログイン成功後の補助 API 呼び出し（user-preferences 取得等）が失敗しても、handleUnauthorized() による強制ログアウトは発生しない"
    added_by: "bugfix/bugfix_login_session_error_after_submit"
    implemented_in:
      - path: "hozen_front/front/src/lib/api/userPreferences.ts"
        status: "implemented"
      - path: "hozen_front/front/src/components/LoginForm.tsx"
        status: "implemented"
      - path: "hozen_front/front/src/components/__tests__/LoginForm.integration.test.tsx"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/login.spec.ts"
        status: "implemented"
  - id: "INV-002"
    description: "ログインページ上での 401 レスポンスは handleUnauthorized() をトリガーしない"
    added_by: "bugfix/bugfix_login_session_error_after_submit"
    implemented_in:
      - path: "hozen_front/front/src/lib/api/auth.ts"
        status: "implemented"
      - path: "hozen_front/front/src/lib/api/__tests__/auth.unauthorized.test.ts"
        status: "implemented"
      - path: "hozen_front/front/src/components/__tests__/LoginForm.integration.test.tsx"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/login-ui.spec.ts"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/session-timeout.spec.ts"
        status: "implemented"
  - id: "INV-003"
    description: "ログイン画面の API タイムアウトは Lambda cold start（最大 30 秒）を考慮した値に設定し、タイムアウト時にはユーザーが理解できる日本語メッセージを表示すること"
    added_by: "bugfix/bugfix_login_network_errors"
    implemented_in:
      - path: "hozen_front/front/src/lib/api/auth.ts"
        status: "implemented"
      - path: "hozen_front/front/src/components/LoginForm.tsx"
        status: "implemented"
      - path: "hozen_front/front/src/lib/api/__tests__/auth.timeout.test.ts"
        status: "implemented"
      - path: "hozen_front/front/src/components/__tests__/LoginForm.integration.test.tsx"
        status: "implemented"
      - path: "hozen_front/front/e2e/auth/login.spec.ts"
        status: "implemented"
  - id: "INV-004"
    description: "CSRF トークン取得（GET /auth/csrf-token）は補助処理であり、取得失敗時はリトライを試み、リトライ後も失敗した場合のみユーザーへのガイドメッセージを表示する。ログインフロー自体をブロックしてはならない"
