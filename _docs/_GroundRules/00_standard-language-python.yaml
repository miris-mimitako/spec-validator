version: 1
id: standard-language-python
status: draft

policy:
  target_framework: python
  target_language: python
  naming_strategy: preserve_python_standard_terms_and_add_missing_ddd_terms
  description: >
    Python の標準語彙と DDD 用語を併用する。
    Python や主要ライブラリの標準的な責務名は保持し、
    ドメイン語はユビキタス言語として別途登録して機械判定する。

decision_rules:
  framework_terms:
    preserve_as_is: true
    allow_alias: false
    allow_translation: false
    note: >
      Python や主要ライブラリで一般的な責務語は標準語として扱う。
      例: Service, Repository, Factory, Serializer, Router, Client
  missing_ddd_terms:
    add_if_missing: true
    create_project_standard: true
    note: >
      DDD で必要だが Python 標準語にない責務語は project standard として追加する。
  generic_terms:
    forbid_generic_primary_name: true
    note: >
      汎用語を主語にした命名は禁止する。

term_schema:
  required_fields:
    - term
    - category
    - layer
    - source
    - allowed_targets
    - aliases
    - description
  category_values:
    - framework
    - ddd
    - test
    - generic_forbidden
  layer_values:
    - presentation
    - application
    - domain
    - infrastructure
    - cross_layer
    - test

terms:
  framework:
    - term: Service
      category: framework
      layer: application
      source: python_standard
      allowed_targets: [class, file]
      aliases: []
      description: application service or service boundary
    - term: Repository
      category: framework
      layer: domain
      source: python_standard
      allowed_targets: [class, file]
      aliases: []
      description: repository boundary
    - term: Factory
      category: framework
      layer: domain
      source: python_standard
      allowed_targets: [class, file]
      aliases: []
      description: object creation boundary
    - term: Serializer
      category: framework
      layer: presentation
      source: python_web
      allowed_targets: [class, file]
      aliases: []
      description: serialization boundary
    - term: Router
      category: framework
      layer: presentation
      source: python_web
      allowed_targets: [file]
      aliases: []
      description: route registration module
    - term: Client
      category: framework
      layer: infrastructure
      source: python_standard
      allowed_targets: [class, file]
      aliases: []
      description: external client boundary
    - term: Handler
      category: framework
      layer: application
      source: python_standard
      allowed_targets: [class, file]
      aliases: []
      description: command or event handling boundary
    - term: Schema
      category: framework
      layer: presentation
      source: python_standard
      allowed_targets: [class, file]
      aliases: []
      description: input or output schema

  ddd:
    - term: Entity
      category: ddd
      layer: domain
      source: ddd
      allowed_targets: [class, file]
      aliases: []
      description: domain entity
    - term: ValueObject
