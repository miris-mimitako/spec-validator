    - term: Specification
      category: ddd
      layer: domain
      source: ddd
      allowed_targets: [class, file]
      aliases: []
      description: business rule specification
    - term: Policy
      category: ddd
      layer: domain
      source: project_standard
      allowed_targets: [class, file]
      aliases: []
