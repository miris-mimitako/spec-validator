    - term: Util
      category: generic_forbidden
      layer: cross_layer
      source: project_rule
      allowed_targets: []
      aliases: [Utils]
      description: forbidden generic role name
    - term: Common
      category: generic_forbidden
      layer: cross_layer
      source: project_rule
      allowed_targets: []
      aliases: []
      description: forbidden generic role name
    - term: Info
      category: generic_forbidden
      layer: cross_layer
      source: project_rule
      allowed_targets: []
      aliases: []
      description: forbidden generic role name
    - term: Data
      category: generic_forbidden
      layer: cross_layer
      source: project_rule
      allowed_targets: []
