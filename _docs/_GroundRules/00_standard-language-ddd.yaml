      category: generic_forbidden
      layer: cross_layer
      source: project_rule
      allowed_targets: []
      aliases: []
      description: forbidden generic role name
    - term: Helper
      category: generic_forbidden
      layer: cross_layer
      source: project_rule
      allowed_targets: []
      aliases: []
