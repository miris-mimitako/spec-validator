version: 1
id: standard-language-ddd
status: draft

policy:
  target_framework: nestjs
  target_language: typescript
  naming_strategy: preserve_framework_terms_and_add_missing_ddd_terms
  description: >
    NestJS が持つ標準語彙は原則そのまま採用する。
    DDD で必要だが NestJS 標準に存在しない概念は追加定義する。
    標準語彙を独自語へ置換してはならない。

decision_rules:
  framework_terms:
    preserve_as_is: true
    allow_alias: false
    allow_translation: false
    note: >
      NestJS の標準語彙は、そのまま利用する。
      例: Module, Controller, Injectable, Guard, Interceptor, Pipe, Filter
  missing_ddd_terms:
    add_if_missing: true
    create_project_standard: true
    note: >
      DDD 上必要な概念で NestJS に標準語彙がない場合は、
      プロジェクト標準語彙として追加する。
  generic_terms:
    forbid_generic_primary_name: true
    note: >
      汎用語は主語として使用してはならない。

term_schema:
  required_fields:
    - term
    - category
    - layer
    - source
    - allowed_targets
    - aliases
    - description
  category_values:
    - framework
    - ddd
    - test
    - generic_forbidden
  layer_values:
    - presentation
    - application
    - domain
    - infrastructure
    - cross_layer
    - test

terms:
  framework:
    - term: Module
      category: framework
      layer: presentation
      source: nestjs
      allowed_targets: [class, file, directory]
      aliases: []
      description: NestJS module boundary
    - term: Controller
      category: framework
      layer: presentation
      source: nestjs
      allowed_targets: [class, file]
      aliases: []
      description: HTTP or transport entry point
    - term: Injectable
      category: framework
      layer: cross_layer
      source: nestjs
      allowed_targets: [decorator]
      aliases: []
      description: NestJS dependency injection decorator
    - term: Guard
      category: framework
      layer: presentation
      source: nestjs
      allowed_targets: [class, file]
      aliases: []
      description: request authorization or access control
    - term: Pipe
      category: framework
      layer: presentation
      source: nestjs
      allowed_targets: [class, file]
      aliases: []
      description: request transformation and validation
    - term: Interceptor
      category: framework
      layer: presentation
      source: nestjs
      allowed_targets: [class, file]
      aliases: []
      description: request or response interception
    - term: Filter
      category: framework
      layer: presentation
      source: nestjs
      allowed_targets: [class, file]
      aliases: []
      description: exception filter
    - term: Middleware
      category: framework
      layer: presentation
      source: nestjs
      allowed_targets: [class, file]
      aliases: []
      description: request middleware
    - term: Decorator
      category: framework
      layer: cross_layer
      source: typescript
      allowed_targets: [function, file]
      aliases: []
      description: TypeScript decorator
    - term: Resolver
      category: framework
      layer: presentation
      source: nestjs_graphql
      allowed_targets: [class, file]
      aliases: []
      description: GraphQL resolver
    - term: Gateway
      category: framework
      layer: presentation
      source: nestjs_websocket
      allowed_targets: [class, file]
      aliases: []
      description: WebSocket gateway
    - term: CommandHandler
      category: framework
      layer: application
      source: nestjs_cqrs
      allowed_targets: [class, file]
      aliases: []
      description: NestJS CQRS command handler
    - term: QueryHandler
      category: framework
      layer: application
      source: nestjs_cqrs
      allowed_targets: [class, file]
      aliases: []
      description: NestJS CQRS query handler
    - term: EventHandler
      category: framework
      layer: application
      source: nestjs_cqrs
      allowed_targets: [class, file]
      aliases: []
      description: NestJS CQRS event handler

  ddd:
    - term: Entity
      category: ddd
      layer: domain
      source: ddd
      allowed_targets: [class, file]
      aliases: []
