version: 1
id: security-rules-python
status: draft

purpose: >
  Python 向けの静的セキュリティルールを定義する。
  実行時 exploit の成立ではなく、危険なコードパターンの存在を検出する。

policy:
  target_language: python
  scan_extensions:
    - ".py"
  comment_prefixes:
    - "#"

rules:
  - rule_id: SEC-001
    issue_code: SENSITIVE_DATA_LOGGING
    severity: error
    description: >
      password, token, secret, api key などの機密情報をログ出力してはならない。
  - rule_id: SEC-002
    issue_code: SQL_INJECTION_RISK
    severity: error
    description: >
      SQL 文字列を format, f-string, 連結で組み立てて execute 系 API に渡してはならない。
      パラメータ化された query を使う。
  - rule_id: SEC-003
    issue_code: FORBIDDEN_DIRECT_LITERAL_ASSIGNMENT
    severity: error
    description: >
      リテラル値を通常変数へ直接代入してはならない。
      必ず定数名または Final 付き定義を経由して参照する。
  - rule_id: SEC-004
    issue_code: FORBIDDEN_DANGEROUS_API
    severity: warning
    description: >
      eval, exec, shell 実行, pickle loads などの危険 API は原則禁止する。

detection:
  sensitive_logging:
    logger_tokens:
      - "logger.info"
      - "logger.warning"
      - "logger.error"
      - "logger.debug"
      - "logging.info"
      - "logging.warning"
      - "logging.error"
      - "print("
    sensitive_terms:
      - "password"
      - "passwd"
      - "pwd"
      - "token"
      - "secret"
      - "apikey"
      - "api_key"
      - "access_token"
      - "refresh_token"
      - "authorization"
  sql_injection_risk:
    execution_tokens:
      - ".execute("
      - ".executemany("
      - "cursor.execute("
      - "session.execute("
    sql_keywords:
      - "SELECT"
      - "INSERT"
      - "UPDATE"
      - "DELETE"
    risky_construction_patterns:
      - "f[\"']"
      - "\"\\s*\\+"
      - "'\\s*\\+"
      - "\\.format\\s*\\("
      - "[\"']\\s*%\\s*[A-Za-z_\\(\\[]"
  direct_literal_assignment:
    allowed_assignment_patterns:
      - "^[A-Z][A-Z0-9_]*\\s*=\\s*"
      - ":\\s*Final\\[?.*\\]?\\s*=\\s*"
      - "\\bFinal\\s*=\\s*"
    literal_patterns:
      - "\"(?:[^\"\\\\]|\\\\.)*\""
      - "'(?:[^'\\\\]|\\\\.)*'"
      - "\\b\\d+(?:\\.\\d+)?\\b"
      - "\\bTrue\\b"
      - "\\bFalse\\b"
      - "\\bNone\\b"
    declaration_patterns:
      - "^[a-z_][A-Za-z0-9_]*\\s*=\\s*(?P<literal>VALUE)"
  dangerous_api:
    patterns:
      - "\\beval\\s*\\("
      - "\\bexec\\s*\\("
      - "subprocess\\.(?:Popen|run|call)\\s*\\("
      - "pickle\\.(?:loads|load)\\s*\\("
      - "yaml\\.load\\s*\\("

reporting:
  include_line_numbers: true
  include_source_lines: true
