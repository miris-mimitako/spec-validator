validation_hints:
  class_name_case: PascalCase
  function_name_case: PascalCase
  file_name_case: PascalCase
  domain_term_must_exist_in_dictionary: true
  framework_term_must_be_from_registered_list: true
  forbidden_term_match_mode: exact_token
  aliases_allowed_only_when_registered: true

future_files:
  domain_dictionary: _docs/_GroundRules/01_domain-terms.yaml
  naming_exceptions: _docs/_GroundRules/90_naming-exceptions.yaml
